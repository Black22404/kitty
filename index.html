<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Cat Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; 
            user-select: none;
        }
        
        canvas {
            background-color: #000;
            border: 2px solid #111;
            box-shadow: 0 0 30px rgba(64, 224, 208, 0.15);
            image-rendering: pixelated; 
            max-width: 95%; 
            height: auto;
            aspect-ratio: 800 / 300; 
        }

        #scoreBoard {
            position: absolute;
            top: 30px;
            color: #40E0D0;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px #40E0D0;
            z-index: 10;
        }

        #lastScoreBoard {
            position: absolute;
            top: 70px;
            color: #40E0D0;
            font-size: 18px;
            opacity: 0.7;
            display: none;
            z-index: 10;
        }

        #instructions {
            position: absolute;
            top: 100px;
            color: #40E0D0;
            font-size: 16px;
            text-shadow: 0 0 8px #40E0D0;
            z-index: 10;
            animation: blink 1.5s infinite;
        }

        #copyright {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #40E0D0;
            font-size: 14px;
            text-shadow: 0 0 5px #40E0D0;
            opacity: 0.7;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="scoreBoard">Score: <span id="scoreVal">0</span></div>
    <div id="lastScoreBoard">Last Score: <span id="lastScoreVal">0</span></div>
    <div id="instructions">Press Space or Tap to start</div>
    <div id="copyright">© Eva</div>
    
    <canvas id="gameCanvas" width="800" height="300"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');
        const lastScoreElement = document.getElementById('lastScoreVal');
        const lastScoreBoard = document.getElementById('lastScoreBoard');
        const instructionsElement = document.getElementById('instructions');

        let score = 0;
        let lastScore = 0;
        let frames = 0;
        let gameSpeed = 11;
        let gameOver = false;
        let gameStarted = false;
        let gameOverReason = ""; 
        let entities = []; 

        const phrases = ["Purr-fect!", "Keep Glowing!", "Meow-gical!", "You're a Star!", "Neon Power!", "On Fire!"];
        let currentPhrase = "";
        let phraseTimer = 0;

        const cat = {
            x: 40,
            targetX: canvas.width / 3, 
            y: 200,
            w: 45,
            h: 30, 
            legH: 12, 
            dy: 0,
            gravity: 0.8,
            jumpForce: -13.5,
            grounded: false,
            flameLevel: 0, 
            
            jump: function() {
                if (this.grounded) {
                    this.dy = this.jumpForce;
                    this.grounded = false;
                }
            },
            
            draw: function() {
                let displayScore = Math.floor(score / 10);
                let alpha = Math.min(1, 0.15 + (displayScore / 80)); 
                
                if (this.flameLevel > 0) {
                    let flameColors = ['#FFCC00', '#FFA500', '#FF4500']; 
                    let flicker = flameColors[Math.floor(frames / 5) % flameColors.length];
                    ctx.shadowBlur = Math.min(150, 50 + (this.flameLevel * 15)); 
                    ctx.shadowColor = flicker;
                    ctx.fillStyle = flicker;
                } else {
                    let extraGlow = Math.min(displayScore, 80); 
                    ctx.shadowBlur = extraGlow;
                    ctx.shadowColor = `rgba(64, 224, 208, ${alpha})`; 
                    ctx.fillStyle = `rgba(64, 224, 208, ${alpha})`; 
                }
                
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.fillRect(this.x, this.y - 12, 12, 12);
                ctx.fillRect(this.x + this.w - 12, this.y - 12, 12, 12);
                ctx.fillRect(this.x - 15, this.y + 8, 15, 8);

                ctx.shadowBlur = 0; 

                if (gameOver) {
                    ctx.fillStyle = '#050505'; 
                    ctx.fillRect(this.x + 24, this.y + 10, 6, 3); 
                    ctx.fillRect(this.x + 36, this.y + 10, 6, 3); 
                    
                    ctx.fillStyle = '#00aaff'; 
                    ctx.fillRect(this.x + 25, this.y + 13, 3, 9);
                    ctx.fillRect(this.x + 37, this.y + 13, 3, 9);
                } else {
                    ctx.fillStyle = '#050505'; 
                    ctx.fillRect(this.x + 24, this.y + 6, 5, 5);
                    ctx.fillRect(this.x + 36, this.y + 6, 5, 5);

                    if (displayScore >= 50) {
                        ctx.fillRect(this.x + 26, this.y + 15, 3, 3); 
                        ctx.fillRect(this.x + 29, this.y + 18, 6, 3); 
                        ctx.fillRect(this.x + 35, this.y + 15, 3, 3); 
                    }
                }

                if (this.flameLevel > 0) {
                    ctx.fillStyle = ['#FFCC00', '#FFA500'][Math.floor(frames / 5) % 2];
                } else {
                    ctx.fillStyle = `rgba(64, 224, 208, ${alpha})`; 
                }

                if (this.grounded) {
                    if (frames % 20 < 10 && gameStarted && !gameOver) {
                        ctx.fillRect(this.x + 4, this.y + this.h, 8, this.legH);
                        ctx.fillRect(this.x + this.w - 12, this.y + this.h, 8, this.legH);
                    } else {
                        ctx.fillRect(this.x + 12, this.y + this.h, 8, this.legH);
                        ctx.fillRect(this.x + this.w - 20, this.y + this.h, 8, this.legH);
                    }
                } else {
                    ctx.fillRect(this.x, this.y + this.h, 12, 8);
                    ctx.fillRect(this.x + this.w - 12, this.y + 12, 12, 8);
                }
            },
            
            update: function() {
                if (gameStarted && !gameOver && this.x < this.targetX) {
                    this.x += 1.5; 
                }
                this.y += this.dy;
                let totalHeight = this.h + this.legH; 
                
                if (this.y + totalHeight < canvas.height - 20) {
                    this.dy += this.gravity;
                    this.grounded = false;
                } else {
                    this.dy = 0;
                    this.grounded = true;
                    this.y = canvas.height - 20 - totalHeight;
                }
                this.draw();
            }
        };

        function drawGround() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            
            let groundGlow = Math.min(Math.floor(score / 50), 20);
            
            if (cat.flameLevel > 0) {
                ctx.shadowColor = '#FFCC00';
                ctx.fillStyle = '#FFCC00';
            } else {
                ctx.shadowColor = '#40E0D0';
                ctx.fillStyle = '#40E0D0';
            }
            
            ctx.shadowBlur = groundGlow;
            ctx.fillRect(0, canvas.height - 20, canvas.width, 2);
            ctx.shadowBlur = 0;
        }

        class Obstacle {
            constructor(isFlying = false, isGreen = false) {
                this.type = isGreen ? 'green' : 'red';
                this.w = 20 + Math.random() * 20; 
                this.x = canvas.width;
                this.isFlying = isFlying;
                
                if (isFlying) {
                    this.h = 20;
                    this.y = canvas.height - 20 - 90 - Math.random() * 15; 
                } else {
                    this.h = 35 + Math.random() * 40; 
                    this.y = canvas.height - 20 - this.h;
                }
            }
            draw() {
                if (this.type === 'green') {
                    ctx.fillStyle = '#00ff00'; 
                } else {
                    ctx.fillStyle = this.isFlying ? '#ff00ff' : '#ff0055'; 
                }
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(this.x, this.y, this.w, this.h);
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + 2, this.y + 2, 4, 4);
            }
            update() {
                this.x -= gameSpeed;
                this.draw();
            }
        }

        class Food {
            constructor() {
                this.type = 'food';
                this.w = 18;
                this.h = 18;
                this.x = canvas.width;
                this.y = canvas.height - 20 - 30 - Math.random() * 80; 
            }
            draw() {
                ctx.fillStyle = '#FFD700'; 
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#FFD700';
                
                ctx.beginPath();
                ctx.moveTo(this.x + this.w/2, this.y);
                ctx.lineTo(this.x + this.w, this.y + this.h/2);
                ctx.lineTo(this.x + this.w/2, this.y + this.h);
                ctx.lineTo(this.x, this.y + this.h/2);
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowBlur = 0;
            }
            update() {
                this.x -= gameSpeed;
                this.draw();
            }
        }

        function handleEntities() {
            let displayScore = Math.floor(score / 10);
            
            if (gameStarted) {
                let spawnInterval = Math.max(35, 75 - Math.floor(displayScore / 25) * 5);
                
                if (frames % spawnInterval === 0) {
                    let lastEnt = entities[entities.length - 1];
                    let safeToSpawn = !lastEnt || (canvas.width - lastEnt.x > 330);
                    
                    if (safeToSpawn) {
                        if (displayScore >= 200 && Math.random() > 0.85) {
                            entities.push(new Food());
                        } else {
                            let isFlying = displayScore >= 75 && Math.random() > 0.6;
                            let isGreen = displayScore >= 75 && Math.random() > 0.7; 
                            entities.push(new Obstacle(isFlying, isGreen));
                        }
                    }
                }
            }
            
            for (let i = 0; i < entities.length; i++) {
                entities[i].update();
                
                let totalHeight = cat.h + cat.legH;
                let ent = entities[i];
                
                let isHit = cat.x < ent.x + ent.w &&
                            cat.x + cat.w > ent.x &&
                            cat.y < ent.y + ent.h &&
                            cat.y + totalHeight > ent.y;
                
                if (ent.type === 'food') {
                    if (isHit) {
                        cat.flameLevel++;
                        score += 50; 
                        currentPhrase = "Level Up!";
                        phraseTimer = 60;
                        entities.splice(i, 1);
                        i--;
                        continue;
                    }
                } else if (ent.type === 'green') {
                    if (isHit) {
                        score += 50; 
                        currentPhrase = "Nice Hit!";
                        phraseTimer = 60;
                        entities.splice(i, 1);
                        i--;
                        continue;
                    } else if (ent.x + ent.w < 0) {
                        gameOver = true;
                        gameOverReason = "You missed the Green target!";
                    }
                } else if (ent.type === 'red') {
                    if (isHit) {
                        gameOver = true;
                        gameOverReason = "";
                    }
                }
                
                if (ent.x + ent.w < 0) {
                    entities.splice(i, 1);
                    i--;
                }
            }
        }

        function drawBackground() {
            let light = Math.min(25, Math.floor(score / 100)); 
            ctx.fillStyle = `rgb(0, ${light}, ${light})`; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function handleMotivationalPhrases() {
            if (score > 0 && score % 400 === 0 && currentPhrase !== "Nice Hit!") {
                currentPhrase = phrases[Math.floor(Math.random() * phrases.length)];
                phraseTimer = 120; 
            }

            if (phraseTimer > 0) {
                ctx.save();
                ctx.globalAlpha = phraseTimer / 120; 
                ctx.fillStyle = cat.flameLevel > 0 ? '#FFCC00' : '#ff00ff'; 
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.fillStyle;
                ctx.font = 'bold 24px Courier New';
                ctx.textAlign = 'center';
                let floatOffset = 20 - (phraseTimer / 6); 
                ctx.fillText(currentPhrase, canvas.width / 2, 120 - floatOffset);
                ctx.restore();
                phraseTimer--;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawGround();

            if (gameOver) {
                for (let i = 0; i < entities.length; i++) entities[i].draw();
                cat.draw(); 

                lastScore = Math.floor(score / 10);
                lastScoreElement.innerText = lastScore;
                lastScoreBoard.style.display = 'block';

                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff0055';
                ctx.fillStyle = '#ff0055';
                ctx.textAlign = 'center';
                
                ctx.font = '30px Courier New';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#40E0D0';
                
                if (gameOverReason) {
                    ctx.font = '14px Courier New';
                    ctx.fillStyle = '#ff00ff';
                    ctx.fillText(gameOverReason, canvas.width/2, canvas.height/2 + 5);
                    ctx.fillStyle = '#40E0D0';
                    ctx.font = '16px Courier New';
                    ctx.fillText('Tap or Press Space to Restart', canvas.width/2, canvas.height/2 + 35);
                } else {
                    ctx.font = '16px Courier New';
                    ctx.fillText('Tap or Press Space to Restart', canvas.width/2, canvas.height/2 + 15);
                }
                
                return; 
            }
            
            if (gameStarted) {
                handleEntities();
                handleMotivationalPhrases();
                
                score++;
                scoreElement.innerText = Math.floor(score / 10);
                
                if (frames % 150 === 0) {
                    gameSpeed += 0.5; 
                }
                frames++;
            }
            
            cat.update();
            requestAnimationFrame(animate);
        }

        function handleInput(e) {
            if (e.type === 'touchstart') e.preventDefault(); 
            if (e.type === 'keydown' && e.code !== 'Space') return;

            if (gameOver) {
                gameOver = false;
                gameStarted = true; 
                score = 0;
                frames = 0;
                gameSpeed = 11;
                phraseTimer = 0;
                entities = [];
                gameOverReason = "";
                cat.x = 40; 
                cat.y = 200;
                cat.dy = 0;
                cat.flameLevel = 0; 
                scoreElement.innerText = "0";
                animate();
                cat.jump();
            } else {
                if (!gameStarted) {
                    gameStarted = true;
                    instructionsElement.style.display = 'none';
                }
                cat.jump();
            }
        }

        window.addEventListener('keydown', handleInput);
        window.addEventListener('touchstart', handleInput, { passive: false });

        animate();
    </script>
</body>
</html>
